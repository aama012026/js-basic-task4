<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="stylesheet" href="view.css">
	<script src="app.js" defer></script>

	<title>HSL explorer</title>
</head>
<body>
	<h1>HSL explorer</h1>
	<main>
		<div class="flex-h">
			<div class="grid-2c">
				<h2>toggle</h2>
				<label for="enable-hue">H</label>
				<input id="enable-hue" name="enable-hue" type="checkbox" checked>
				<label for="enable-saturation">S</label>
				<input id="enable-saturation" name="enable-saturation" type="checkbox" checked>
				<label for="enable-lightness">L</label>
				<input id="enable-lightness" name="enable-lightness" type="checkbox" checked>
			</div>
			<span id="origin-wheel" class="circle tone-wheel"></span>
		</div>
		<div id="tone-wheel-box" class="flex-h"></div>
	</main>
</body>
</html>
